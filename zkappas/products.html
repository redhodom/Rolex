<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/produtcs.css">
    <link rel="icon" href="../images/rolex.png" type="image/png">
    <script src="https://kit.fontawesome.com/65ea4e24e1.js" crossorigin="anonymous"></script>
    <title>Products</title>
</head>
<body>
      <div class="top">

    <select id="countries" name="countries">

        <option value="INDIA">INDIA</option>
        <option value="USA">USA</option>
        <option value="RUSSIA">RUSSIA</option>

    </select>

        <div class="location">
            <i class="fa-solid fa-location-dot"></i>
            <span>STORE</span>
        </div>

        <div class="regoptions">
            <a href="#">REGISTER</a>
            <span>/</span>
            <a href="#">SIGN IN</a>
        </div>

    </div>

    <div class="head">
        <div class="logo">
            <img src="../images/rolex.png" alt="logo" class="logo">
            <span class="logoname">ROLEX</span>
        </div>

            <nav>
            <ul>
                <li><select name="" id="" class="shopmenu">
                    <option value=""><a href="#">Shop Menu</a></option>
                    <option value=""><a href="#">Classic</a></option>
                    <option value=""><a href="#">Premium</a></option>
                </select></li>

                <li><a href="#">Our Story</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            </nav>


        <div class="icons">
             <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>
    </div>

    <div class="banner">
          <div class="overlay"> <h1>R O L E X</h1>  </div>
        <img src="../images/wide_collage.jpg" alt="banner" class="bannerimg">
    </div>

    <div class="product-toolbar">

      <div class="toolbar-left">
        <h3 class="product-count">Products (12)</h3>
        <div class="filter-wrapper">

             <button class="filter-btn" id="filterToggle"><i class="fa-solid fa-sliders"></i>Filter</button>

             <div class="filters" id="filterPanel">
               <label><input type="checkbox" value="4" class="ratingFilter">Ratings 4⭐ & above</label>
               <label><input type="checkbox" value="5" class="ratingFilter">Ratings 5⭐</label>
             </div>

        </div>

        <div class="view-icons">
          <i class="fa-solid fa-grip"></i>
          <i class="fa-solid fa-list"></i>

    </div>

      </div>

      <div class="toolbar-right">
        <span>Sort By:</span>
        <select id="sortSelect">
          <option value="az">Alphabetically, A-Z</option>
          <option value="za">Alphabetically, Z-A</option>
          <option value="low">Price, Low to High</option>
          <option value="high">Price, High to Low</option>
        </select>
      </div>
    </div>


    <section class="product-grid" id="productGrid">
    </section>

     <footer class="footer-wrapper">

    <div class="footer-middle">
    <div class="footer-col">
      <h5>LINKS</h5>
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">Customer Service</a>
      <a href="#">FAQs</a>
      <a href="#">Sitemap</a>
    </div>

    <div class="footer-col">
      <h5>INFORMATION</h5>
      <a href="#">Terms of Service</a>
      <a href="#">Refund policy</a>
      <a href="#">Press</a>
    </div>

    <div class="footer-payments">
      <img src="images/visa.png" alt="Visa">
      <img src="images/round.png" alt="Mastercard">
      <img src="images/apple-pay.png" alt="Apple Pay">
      <img src="images/shopping.png" alt="American Express">
    </div>
  </div>

    <div class="footer-bottom">
    <div class="socials">
      <i class="fa-brands fa-facebook-f"></i>
      <i class="fa-brands fa-twitter"></i>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-youtube"></i>
      <i class="fa-brands fa-pinterest"></i>
      <i class="fa-brands fa-linkedin-in"></i>
    </div>

    <p>© 2025 Rolex.</p>
  </div>

   </footer>

<script src="js/products.js"></script>
<script src="js/app.js"></script>

</body>
</html>
