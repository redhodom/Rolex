<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed</title>
    <link rel="stylesheet" href="css/order.css">
    <link rel="icon" href="../images/rolex.png" type="image/png">
    <script src="https://kit.fontawesome.com/65ea4e24e1.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="order-wrapper">
    <div class="order-card">

        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <h1>Order Placed Successfully!</h1>
        <p class="message">
            Thank you for your purchase. Your order has been confirmed and will be processed shortly.
        </p>

        <div class="order-info">
            <p><strong>Order ID:</strong> <span id="orderId"></span></p>
            <p><strong>Estimated Delivery:</strong> 5 – 7 Business Days</p>
            <p><strong>Payment Method:</strong> Online Payment</p>
        </div>

        <div class="actions">
            <a href="index.html" class="btn primary">Continue Shopping</a>
            <a href="orders.html" class="btn secondary">View Orders</a>
        </div>

    </div>
</div>
<script src="js/order.js"></script>
</body>
</html>
